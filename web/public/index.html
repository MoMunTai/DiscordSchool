<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guild War Broadcast — Control</title>
<style>
  :root {
    --bg:#0f1117; --bg2:#161925; --card:#1b1f2e; --line:#2a3046; --txt:#e8eaf2;
    --mut:#888fb0; --acc:#5865f2; --acc2:#7c4dff; --ok:#3ba55d; --off:#ed4245; --air:#ff2d55; --warn:#faa61a;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Segoe UI',Tahoma,sans-serif; background:radial-gradient(1200px 600px at 50% -10%,#1a1f33,#0f1117); color:var(--txt); min-height:100vh; }
  .wrap { max-width:960px; margin:0 auto; padding:18px; }

  header { display:flex; align-items:center; justify-content:space-between; gap:14px; margin:6px 0 18px; }
  .brand { display:flex; align-items:center; gap:14px; }
  .logo { width:46px; height:46px; border-radius:12px; background:linear-gradient(135deg,var(--acc),var(--acc2)); display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 6px 20px rgba(88,101,242,.35); }
  .brand h1 { font-size:21px; margin:0; letter-spacing:.3px; }
  .brand .sub { font-size:12px; color:var(--mut); margin-top:2px; }

  /* ON AIR */
  .onair { display:flex; align-items:center; gap:8px; font-weight:800; font-size:14px; letter-spacing:1.5px;
    padding:9px 16px; border-radius:30px; border:1px solid var(--line); color:var(--mut); background:var(--bg2); transition:.25s; }
  .onair .bulb { width:11px; height:11px; border-radius:50%; background:#555; }
  .onair.live { color:#fff; background:linear-gradient(135deg,#ff2d55,#c0103a); border-color:transparent; box-shadow:0 0 0 0 rgba(255,45,85,.6); animation:pulse 1.3s infinite; }
  .onair.live .bulb { background:#fff; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,45,85,.55)} 70%{box-shadow:0 0 0 12px rgba(255,45,85,0)} 100%{box-shadow:0 0 0 0 rgba(255,45,85,0)} }

  .card { background:linear-gradient(180deg,var(--card),var(--bg2)); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:16px; box-shadow:0 4px 18px rgba(0,0,0,.25); }
  .card h2 { font-size:14px; margin:0 0 12px; color:var(--mut); text-transform:uppercase; letter-spacing:1px; font-weight:700; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .spread { justify-content:space-between; }

  .status-line { display:flex; align-items:center; gap:10px; font-weight:700; font-size:15px; }
  .dot { width:11px; height:11px; border-radius:50%; display:inline-block; }
  .on { background:var(--ok); box-shadow:0 0 8px var(--ok); } .down { background:var(--off); }
  .stats { display:flex; gap:12px; }
  .stat { background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:10px 18px; min-width:96px; text-align:center; }
  .stat .n { font-size:24px; font-weight:800; } .stat .n small { font-size:14px; color:var(--mut); font-weight:600; }
  .stat .l { font-size:11px; color:var(--mut); margin-top:2px; letter-spacing:.5px; }

  button { background:var(--acc); color:#fff; border:0; border-radius:9px; padding:11px 18px; font-size:14px; font-weight:700; cursor:pointer; transition:.15s; }
  button:hover { filter:brightness(1.12); transform:translateY(-1px); } button:active { transform:translateY(0); }
  button:disabled { opacity:.4; cursor:not-allowed; transform:none; filter:none; }
  button.stop { background:var(--off); } button.warn { background:var(--warn); color:#1a1a1a; } button.ghost { background:#2a3046; }
  button.sm { padding:7px 12px; font-size:13px; }

  input[type=number] { width:74px; background:var(--bg); color:var(--txt); border:1px solid var(--line); border-radius:7px; padding:7px; font-size:14px; }
  .vol-room { display:flex; align-items:center; gap:8px; background:var(--bg); padding:9px 11px; border-radius:9px; border:1px solid var(--line); }
  .vol-room .nm { flex:1; font-weight:600; font-size:14px; }
  .vol-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:9px; margin-top:12px; }
  label { color:var(--mut); font-size:13px; }
  .hint { color:var(--mut); font-size:12.5px; }

  #log { background:#0a0c12; border:1px solid var(--line); border-radius:10px; padding:12px; height:340px; overflow:auto;
    font-family:Consolas,'Courier New',monospace; font-size:12.5px; line-height:1.55; white-space:pre-wrap; word-break:break-word; }
  #log .err { color:#ff7b7b; } #log .air { color:#ff8aa0; } #log .ok { color:#7ee2a0; } #log .vol { color:#ffd479; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">🎙</div>
      <div>
        <h1>Guild War Broadcast</h1>
        <div class="sub">ระบบกระจายเสียงสงครามกิลด์ • by KongPlayCh</div>
      </div>
    </div>
    <div class="onair" id="onair"><span class="bulb"></span><span id="onairText">OFF AIR</span></div>
  </header>

  <div class="card">
    <div class="row spread">
      <div class="status-line"><span class="dot down" id="dot"></span><span id="statusText">กำลังเชื่อมต่อ...</span></div>
      <div class="stats">
        <div class="stat"><div class="n"><span id="bots">0</span><small id="botsTotal"></small></div><div class="l">บอทออนไลน์</div></div>
        <div class="stat"><div class="n"><span id="rooms">0</span><small id="roomsTotal"></small></div><div class="l">ห้องพร้อม</div></div>
      </div>
    </div>
    <div class="row" style="margin-top:16px">
      <button id="btnStart" onclick="act('start')">▶ เริ่มออกอากาศ</button>
      <button id="btnStop" class="stop" onclick="act('stop')">■ หยุด</button>
      <button id="btnRestart" class="warn" onclick="act('restart')">↻ รีสตาร์ท</button>
    </div>
  </div>

  <div class="card">
    <h2>🔊 ปรับเสียง Talkback (ห้อง → Leader)</h2>
    <div class="row">
      <label>ทุกห้องพร้อมกัน:</label>
      <input type="number" id="volAll" value="1.0" step="0.1" min="0" max="2" />
      <button class="sm" onclick="setAll()">ตั้งทุกห้อง</button>
      <span class="hint">1.0 = 100% • 1.5 = 150% • 0 = ปิด</span>
    </div>
    <div class="vol-grid" id="volGrid"></div>
  </div>

  <div class="card">
    <div class="row spread">
      <h2 style="margin:0">📄 Log สด</h2>
      <button class="ghost sm" onclick="document.getElementById('log').innerHTML=''">ล้างจอ</button>
    </div>
    <div id="log" style="margin-top:10px"></div>
  </div>
</div>

<script>
let pw = localStorage.getItem("gwb_pw") || "";
function headers() { return pw ? { "Content-Type":"application/json", "x-password":pw } : { "Content-Type":"application/json" }; }

async function api(pathName, method="GET", body) {
  const r = await fetch("/api/"+pathName, { method, headers:headers(), body: body?JSON.stringify(body):undefined });
  if (r.status === 401) { askPw(); throw new Error("unauthorized"); }
  return r.json();
}
function askPw() {
  const p = prompt("ใส่รหัสผ่าน:");
  if (p !== null) { pw = p; localStorage.setItem("gwb_pw", p); location.reload(); }
}
async function act(a) { try { await api(a, "POST"); } catch(e){} }
async function setRoom(room, value) { try { await api("volume","POST",{room,value:parseFloat(value)}); } catch(e){} }
async function setAll() { try { await api("volume","POST",{all:parseFloat(document.getElementById("volAll").value)}); } catch(e){} }

function renderRooms(rooms) {
  const g = document.getElementById("volGrid");
  if (g.dataset.done === "1") return;
  g.innerHTML = "";
  rooms.forEach(r => {
    const name = r.replace('Bot','');
    const d = document.createElement("div");
    d.className = "vol-room";
    d.innerHTML = `<span class="nm">${name}</span>
      <input type="number" value="1.0" step="0.1" min="0" max="2" id="v_${r}" />
      <button class="sm" onclick="setRoom('${r}', document.getElementById('v_${r}').value)">ตั้ง</button>`;
    g.appendChild(d);
  });
  if (rooms.length) g.dataset.done = "1";
}

function applyStatus(s) {
  document.getElementById("bots").textContent = s.bots || 0;
  document.getElementById("rooms").textContent = s.rooms || 0;
  document.getElementById("botsTotal").textContent = s.totalBots ? " / " + s.totalBots : "";
  document.getElementById("roomsTotal").textContent = s.totalRooms ? " / " + s.totalRooms : "";
  const on = s.running;
  document.getElementById("dot").className = "dot " + (on ? "on" : "down");
  document.getElementById("statusText").textContent = on ? (s.ready ? "กำลังทำงาน" : "กำลังเริ่ม...") : "หยุดอยู่";
  document.getElementById("btnStart").disabled = on;
  document.getElementById("btnStop").disabled = !on;

  const air = document.getElementById("onair");
  const live = on && s.air;
  air.className = "onair" + (live ? " live" : "");
  document.getElementById("onairText").textContent = live ? "ON AIR" : "OFF AIR";
}

function addLog(line) {
  const el = document.getElementById("log");
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
  const div = document.createElement("div");
  if (/⛔|error|ไม่สำเร็จ|ผิดพลาด/i.test(line)) div.className = "err";
  else if (/ON AIR|🔴/.test(line)) div.className = "air";
  else if (/✅|พร้อมทำงาน/.test(line)) div.className = "ok";
  else if (/🔊/.test(line)) div.className = "vol";
  div.textContent = line;
  el.appendChild(div);
  while (el.childNodes.length > 800) el.removeChild(el.firstChild);
  if (atBottom) el.scrollTop = el.scrollHeight;
}

function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/?pw=${encodeURIComponent(pw)}`);
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === "init") { renderRooms(m.rooms||[]); applyStatus(m.stats||{}); (m.logs||[]).forEach(addLog); }
    else if (m.type === "log") addLog(m.line);
    else if (m.type === "status") applyStatus(m.stats||{});
  };
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror = () => ws.close();
}

api("status").then(d => { renderRooms(d.rooms||[]); applyStatus(d.stats||{}); connect(); }).catch(()=>{ connect(); });
</script>
</body>
</html>
